<!DOCTYPE html>
<html lang="pt-BR" data-palette="dusk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delta Academy &mdash; Catálogo de Tools</title>
<link rel="icon" href="https://tutoriais.deltaacademy.ai/icon.png">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  [data-palette="dusk"]{--bg:#141F1D;--panel:#1A2927;--accent:#A4AE9C;--accent2:#D1AA53;--accent-light:#2A433F;--accent-lighter:#223532;--accent-border:#385652;--gold:#D1AA53;--text:#ECEAE0;--text2:#C7CEC1;--text3:#8A938F;--border:#2A433F;--border2:#385652;--shadow-xs:0 1px 2px rgba(0,0,0,0.4);--shadow-sm:0 2px 6px rgba(0,0,0,0.5),0 1px 2px rgba(0,0,0,0.3);--header-bg:#0A1211;--header-sub:#D1AA53;--card-head:#1F3331;--card-tag:#D1AA53;--card-tag-fg:#141F1D}
  [data-palette="cream"]{--bg:#F2ECE0;--panel:#FBF7EC;--accent:#8A6E2C;--accent2:#1F3331;--accent-light:#E7DFCE;--accent-lighter:#EFE8D7;--accent-border:#D8CFB7;--gold:#B8933E;--text:#1A1A1A;--text2:#4A4538;--text3:#8A7F64;--border:#E1D8C2;--border2:#D1C7AD;--shadow-xs:0 1px 2px rgba(31,51,49,0.06);--shadow-sm:0 1px 3px rgba(31,51,49,0.08),0 1px 2px rgba(31,51,49,0.05);--header-bg:#1F3331;--header-sub:#D1AA53;--card-head:#1F3331;--card-tag:#B8933E;--card-tag-fg:#F2ECE0}
  .palette-toggle{position:fixed;top:14px;right:14px;z-index:100;width:34px;height:34px;border-radius:50%;background:var(--panel);border:1px solid var(--border);box-shadow:var(--shadow-sm);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);transition:all 160ms ease;padding:0}
  .palette-toggle:hover{color:var(--text);border-color:var(--border2)}
  .palette-toggle svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Montserrat',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;transition:background 200ms ease,color 200ms ease;min-height:100vh}
  .header{background:var(--header-bg);padding:32px 24px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.06)}
  .header-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:16px}
  .header-logo img{max-height:34px;width:auto;max-width:180px;display:block}
  .header-logo span{font-size:0.7rem;font-weight:800;color:var(--header-sub);text-transform:uppercase;letter-spacing:0.14em}
  .header-title{font-size:clamp(1.4rem,4vw,2rem);font-weight:800;color:var(--text);letter-spacing:-0.03em;margin-bottom:6px}
  .header-sub{font-size:0.78rem;color:var(--text3)}
  .tools-count{display:inline-block;background:var(--accent-light);color:var(--accent2);border:1px solid var(--accent-border);font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;padding:4px 14px;border-radius:20px;margin-top:14px}
  .grid{max-width:1000px;margin:36px auto;padding:0 24px 64px;display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
  .tool-card{background:var(--panel);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:transform 0.18s,box-shadow 0.18s,border-color 0.18s;text-decoration:none;display:block;box-shadow:var(--shadow-xs)}
  .tool-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-sm);border-color:var(--border2)}
  .card-head{background:var(--card-head);padding:16px 18px}
  .card-tag{font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--card-tag);margin-bottom:6px}
  .card-title{font-size:0.96rem;font-weight:800;color:var(--text);letter-spacing:-0.02em;line-height:1.25}
  .card-body{padding:16px 18px}
  .card-desc{font-size:0.78rem;line-height:1.6;color:var(--text2);margin-bottom:12px}
  .card-footer{display:flex;align-items:center;justify-content:space-between}
  .card-author{font-size:0.64rem;color:var(--text3);font-weight:600;letter-spacing:0.02em}
  .card-arrow{font-size:0.78rem;font-weight:700;color:var(--accent2)}
  .footer{background:var(--header-bg);color:var(--text3);text-align:center;padding:20px 24px;font-size:0.7rem;letter-spacing:0.04em;border-top:1px solid rgba(255,255,255,0.06)}
  @media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<button class="palette-toggle" id="palette-toggle" onclick="togglePalette()" title="Modo claro">

</button>
